{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Sign In - AuroraMart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'storefront/css/styles.css' %}">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="text-center mb-3">
              <img src="{% static 'images/AuroraMart_Logo.png' %}" alt="AuroraMart" width="64" height="64" class="rounded-circle border mb-2">
              <h4 class="mb-0">Admin Sign In</h4>
              <p class="text-muted small">Sign in with your staff account</p>
            </div>

            {% if messages %}
              {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'secondary' }}">{{ message }}</div>
              {% endfor %}
            {% endif %}

            <form method="post" novalidate>
              {% csrf_token %}
              <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" required autofocus>
              </div>
              <div class="mb-3">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
              </div>
              <input type="hidden" name="next" value="{{ request.GET.next|default:'' }}">
              <div class="d-grid gap-2">
                <button class="btn btn-primary" type="submit">Sign in</button>
              </div>
            </form>

            <div class="mt-3 d-flex justify-content-between small">
              <a href="{% url 'store:password_reset' %}">Forgot password?</a>
              <a href="{% url 'store:register' %}">Create account</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</body>
</html>
