{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Aurora Mart Admin Panel</title>
    <link rel="icon" type="image/png" href="{% static 'images/AuroraMart_Logo.png' %}">

    <style>
        /* Reset some default styles */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            background-color: #333;
            color: white;
            padding: 10px 20px;
            height: 60px;
        }

        header img {
            height: 40px;
            margin-right: 15px;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        /* Main layout: sidebar + content */
        .main {
            flex: 1;
            display: flex;
        }

        nav {
            width: 20%;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-bottom: 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .content {
            width: 80%;
            padding: 20px;
            background-color: #f9f9f9;
            overflow-y: auto;
        }

        /* Tables */
        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }

        th,
        td {
            padding: 8px;
            border: 1px solid #ccc;
            text-align: left;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }

        a.button {
            display: inline-block;
            padding: 5px 10px;
            background-color: #007BFF;
            color: white;
            border-radius: 3px;
            text-decoration: none;
            margin-top: 5px;
        }

        a.button:hover {
            background-color: #0056b3;
        }

        /* Notification Styles */
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification {
            transition: opacity 0.3s ease-out;
        }

        .notification-success {
            background-color: #28a745;
            color: white;
        }

        .notification-error {
            background-color: #dc3545;
            color: white;
        }

        .notification-warning {
            background-color: #ffc107;
            color: #333;
        }

        .notification-info {
            background-color: #17a2b8;
            color: white;
        }

        .notification-debug {
            background-color: #007BFF;
            color: white;
        }

        input,textarea, select {
            font-family: inherit;
            /* Uses the same font as the body */
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <a href="{% url 'admin_panel:dashboard' %}"
            style="display: flex; align-items: center; text-decoration: none; color: white;">
            <img src="{% static 'images/AuroraMart_Logo.png' %}" alt="Company Logo">
            <h1>Admin Panel</h1>
        </a>
    </header>

    <!-- Notifications -->
    {% include 'base_notifications.html' %}

    <!-- Sidebar + Content -->
    <div class="main">
        <nav>
            <a href="{% url 'admin_panel:dashboard' %}">Dashboard</a>
            <a href="{% url 'admin_panel:product_list' %}">Products</a>
            <a href="{% url 'admin_panel:customer_list' %}">Customers</a>
            <a href="{% url 'admin_panel:transaction_list' %}">Transactions</a>
            <a href="{% url 'admin_panel:inventory_list' %}">Inventory</a>
            <a href="{% url 'admin_panel:order_list' %}">Inventory Orders</a>
            <a href="{% url 'admin_panel:incoming_stock' %}">Incoming Orders</a>
            <a href="{% url 'admin_panel:inventory_history' %}">Inventory History</a>
        </nav>

        <div class="content">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <!-- Footer -->
    <footer>
        &copy; {{ year|default:"2025" }} Negars4Sale.com
    </footer>
</body>

</html>
